<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusAudit MVP</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark">
<div class="container">
  <header>
    <h1>NexusAudit</h1>
    <p class="subtitle">Forensic Revenue Integrity Engine</p>
  </header>
  <div class="upload-section">
    <h2>Upload CSV Files</h2>
    <div class="file-grid">
      <label>Shopify Orders <input type="file" id="shopifyOrders" accept=".csv"></label>
      <label>Shopify Payouts <input type="file" id="shopifyPayouts" accept=".csv"></label>
      <label>TikTok Orders <input type="file" id="tiktokOrders" accept=".csv"></label>
      <label>TikTok Settlements <input type="file" id="tiktokSettlements" accept=".csv"></label>
      <label>Stripe Payouts (optional) <input type="file" id="stripePayouts" accept=".csv"></label>
    </div>
    <div class="api-key">
      <label>GROK API Key (optional) <input type="password" id="grokKey" placeholder="xai-..."></label>
    </div>
    <button id="runAudit" onclick="runAudit()">Run Audit</button>
    <div id="progress" class="progress hidden">Processing...</div>
  </div>
  <div id="report" class="report hidden">
    <h2>Audit Report</h2>
    <div id="reportContent"></div>
  </div>
</div>
<script>
async function runAudit() {
  const formData = new FormData();
  const files = {
    shopifyOrders: 'shopify_orders',
    shopifyPayouts: 'shopify_payouts',
    tiktokOrders: 'tiktok_orders',
    tiktokSettlements: 'tiktok_settlements',
    stripePayouts: 'stripe_payouts'
  };
  Object.entries(files).forEach(([id, name]) => {
    const f = document.getElementById(id).files[0];
    if (f) formData.append(name, f);
  });
  const grokKey = document.getElementById('grokKey').value;
  if (grokKey) formData.append('grok_api_key', grokKey);

  document.getElementById('progress').classList.remove('hidden');
  // First upload files
  const uploadResp = await fetch('/upload', { method: 'POST', body: formData });
  const uploadResult = await uploadResp.json();

  // Then run audit
  const auditForm = new FormData();
  auditForm.append('temp_dir', uploadResult.temp_dir);
  if (grokKey) auditForm.append('grok_api_key', grokKey);
  const auditResp = await fetch('/run-audit', { method: 'POST', body: auditForm });
  const report = await auditResp.json();

  document.getElementById('progress').classList.add('hidden');
  displayReport(report);
}

function displayReport(report) {
  document.getElementById('report').classList.remove('hidden');
  const content = document.getElementById('reportContent');
  content.innerHTML = `
    <div class="scores">
      <div>Data Quality: <span>${report.data_quality_score}/100</span></div>
      <div>Leakage Risk: <span>${report.leakage_risk_score}/100</span></div>
      <div>Est. Recoverable: <span>$${report.estimated_recoverable_value.toFixed(2)}</span></div>
    </div>
    <h3>Findings</h3>
    <ul>${report.findings.map(f => `<li class="${f.confidence.toLowerCase()}">[${f.confidence}] ${f.summary}</li>`).join('')}</ul>
    ${report.executive_narrative ? `<div class="narrative"><h3>AI Executive Summary</h3><p>${report.executive_narrative.replace(/\n/g, '<br>')}</p></div>` : ''}
  `;
}
</script>
</body>
</html>
